<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 420" width="1200" height="420" font-family="ui-sans-serif,-apple-system,Segoe UI,Inter,Helvetica,Arial,sans-serif" role="img" aria-label="orderbook — a limit order book and matching engine in Go">
  <rect x="1" y="1" width="1198" height="418" rx="18" fill="#0a0c12" stroke="#1b2030"/>

  <!-- left: wordmark + tagline -->
  <text x="60" y="98" font-size="50" font-weight="700" letter-spacing="-1.5" fill="#e8ecf4">orderbook</text>
  <rect x="62" y="116" width="66" height="3" rx="1.5" fill="#d8a24a"/>
  <text x="60" y="160" font-size="22" fill="#b6bec9">A limit order book &amp; matching engine, in Go.</text>

  <text x="60" y="250" font-size="15.5" fill="#7a8290">int64 ticks · zero-alloc hot path · deterministic replay</text>
  <text x="60" y="276" font-size="15.5" fill="#7a8290">pre-trade risk · surveillance · threat-model-driven integrity</text>

  <text x="60" y="322" font-size="14.5" fill="#6b7280">6&#8202;ns read&#8195;·&#8195;~2.8M matches/s&#8195;·&#8195;0 alloc/op&#8195;·&#8195;MIT</text>

  <text x="60" y="382" font-size="16" font-weight="600" fill="#d8a24a">&#9654;&#8195;Try it live — intrepidkarthi.github.io/orderbook</text>

  <!-- right: live order-book ladder motif -->
  <text x="672" y="66" font-size="12.5" letter-spacing="1" fill="#5a6270">PRICE</text>
  <text x="1128" y="66" font-size="12.5" letter-spacing="1" text-anchor="end" fill="#5a6270">SIZE</text>

  <!-- asks (red) -->
  <rect x="672" y="86"  width="380" height="30" rx="4" fill="#e5484d" fill-opacity="0.15"/>
  <text x="682" y="107" font-size="17" font-weight="600" fill="#e5686c">102</text>
  <text x="1128" y="107" font-size="16" text-anchor="end" fill="#8a929e">5</text>

  <rect x="672" y="126" width="152" height="30" rx="4" fill="#e5484d" fill-opacity="0.15"/>
  <text x="682" y="147" font-size="17" font-weight="600" fill="#e5686c">101.5</text>
  <text x="1128" y="147" font-size="16" text-anchor="end" fill="#8a929e">2</text>

  <rect x="672" y="166" width="228" height="30" rx="4" fill="#e5484d" fill-opacity="0.22"/>
  <rect x="672" y="166" width="3" height="30" rx="1.5" fill="#e5484d"/>
  <text x="682" y="187" font-size="17" font-weight="700" fill="#ff6b6f">101</text>
  <text x="1128" y="187" font-size="16" text-anchor="end" fill="#aeb6c2">3</text>

  <!-- spread -->
  <text x="672" y="228" font-size="13.5" fill="#6b7280">spread 1</text>
  <text x="1128" y="228" font-size="13.5" text-anchor="end" fill="#6b7280">mid 100.5</text>

  <!-- bids (green) -->
  <rect x="672" y="248" width="304" height="30" rx="4" fill="#46a758" fill-opacity="0.24"/>
  <rect x="672" y="248" width="3" height="30" rx="1.5" fill="#46a758"/>
  <text x="682" y="269" font-size="17" font-weight="700" fill="#5fd07a">100</text>
  <text x="1128" y="269" font-size="16" text-anchor="end" fill="#aeb6c2">4</text>

  <rect x="672" y="288" width="228" height="30" rx="4" fill="#46a758" fill-opacity="0.16"/>
  <text x="682" y="309" font-size="17" font-weight="600" fill="#4fbc6a">99.5</text>
  <text x="1128" y="309" font-size="16" text-anchor="end" fill="#8a929e">3</text>

  <rect x="672" y="328" width="456" height="30" rx="4" fill="#46a758" fill-opacity="0.16"/>
  <text x="682" y="349" font-size="17" font-weight="600" fill="#4fbc6a">99</text>
  <text x="1128" y="349" font-size="16" text-anchor="end" fill="#8a929e">6</text>
</svg>
