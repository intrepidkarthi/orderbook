name: Deploy demo to Pages

on:
  push:
    branches: [main]
    paths:
      - "web/**"
      - "cmd/obwasm/**"
      - "pkg/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Build engine to WebAssembly
        run: GOOS=js GOARCH=wasm go build -o web/obook.wasm ./cmd/obwasm

      - name: Vendor wasm_exec.js from the Go toolchain
        run: |
          root="$(go env GOROOT)"
          if [ -f "$root/lib/wasm/wasm_exec.js" ]; then
            cp "$root/lib/wasm/wasm_exec.js" web/wasm_exec.js
          else
            cp "$root/misc/wasm/wasm_exec.js" web/wasm_exec.js
          fi

      - uses: actions/configure-pages@v5
        with:
          enablement: true

      - uses: actions/upload-pages-artifact@v3
        with:
          path: web

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
